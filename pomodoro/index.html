<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="fx"></canvas>
  <div id="toast" class="toast"></div>

  <main class="app">
    <h1 class="title">Pomodoro</h1>

    <div class="modes">
      <button class="mode-btn active" data-mode="work">Work</button>
      <button class="mode-btn" data-mode="short">Short Break</button>
      <button class="mode-btn" data-mode="long">Long Break</button>
    </div>

    <div class="clock" id="clock">25:00</div>

    <div class="settings">
      <span id="duration-label" class="settings-label">Work</span>
      <div class="time-inputs">
        <input type="number" id="minutes-input" min="0" max="180" value="25" placeholder="25">
        <span class="colon">:</span>
        <input type="number" id="seconds-input" min="0" max="59" value="0" placeholder="00">
      </div>
    </div>

    <div class="controls">
      <button id="start" class="btn btn-primary">Start</button>
      <button id="reset" class="btn">Reset</button>
    </div>

    <p class="counter">Completed work sessions: <span id="count">0</span></p>
  </main>

  <script src="main.js"></script>
</body>
</html>
